<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="SAP ABAP/Fiori Consultant Portfolio - Expert in SAP Cloud Development and Fiori Applications">
    <meta name="keywords" content="SAP, ABAP, Fiori, UI5, BTP, Cloud Development">
    <title>SAP ABAP/Fiori Consultant Portfolio</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="hero">
        <div class="hero-content">
            <h1>Your Name</h1>
            <p class="title">SAP ABAP/Fiori Consultant</p>
            <div class="certification-badge">
                <img src="assets/sap-certified.png" alt="SAP Certified Development Associate - ABAP Cloud">
                <span>C_ABAPD_2309</span>
            </div>
            <p class="education">MS Computer Science, May 2025</p>
        </div>
    </header>

    <section class="skills">
        <h2>Technical Skills</h2>
        <div class="skills-grid">
            <div class="skill-tile">ABAP Cloud</div>
            <div class="skill-tile">SAPUI5</div>
            <div class="skill-tile">OData</div>
            <div class="skill-tile">Fiori Elements</div>
            <div class="skill-tile">BTP</div>
        </div>
    </section>

    <section class="experience">
        <h2>Professional Experience</h2>
        <div class="timeline">
            <!-- Timeline items will be added here -->
        </div>
    </section>

    <section class="projects">
        <h2>Projects</h2>
        <div class="filter-buttons">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="abap">ABAP</button>
            <button class="filter-btn" data-filter="fiori">Fiori</button>
            <button class="filter-btn" data-filter="fullstack">Full-Stack</button>
        </div>
        <div class="projects-grid">
            <!-- Project tiles will be added here -->
        </div>
    </section>

    <section class="contact">
        <h2>Contact</h2>
        <form class="contact-form">
            <div class="form-group">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" required>
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="form-group">
                <label for="message">Message</label>
                <textarea id="message" name="message" required></textarea>
            </div>
            <button type="submit" class="submit-btn">Send Message</button>
        </form>
        <div class="social-links">
            <a href="https://linkedin.com/in/yourprofile" target="_blank" class="linkedin-btn">
                <img src="assets/linkedin-icon.svg" alt="LinkedIn">
                Connect on LinkedIn
            </a>
        </div>
    </section>

    <footer>
        <p>&copy; 2024 Your Name. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
